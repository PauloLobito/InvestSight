{% extends "base.html" %}

{% block title %}Create Wallet - InvestSight{% endblock %}

{% block content %}
<div class="container">
    <h1>Create Wallet</h1>
    
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required minlength="8" class="form-control">
            <small>This password encrypts your seed phrase locally.</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="8" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Create Wallet</button>
        <a href="{% url 'wallet:wallet' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
