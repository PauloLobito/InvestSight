{% extends "base.html" %}

{% block title %}Login - InvestSight{% endblock %}

{% block content %}
<div class="container">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'portfolio:signup' %}">Sign up</a></p>
</div>
{% endblock %}
